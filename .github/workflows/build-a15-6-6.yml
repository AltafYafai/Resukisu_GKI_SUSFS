name: Build Kernel - Android 15 (6.6)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      kernelsu_branch:
        description: "KernelSU-Next branch/commit (leave empty for latest tag)"
        type: string
        default: ""
        required: false

jobs:
  build-kernel:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android15"
      kernel_version: "6.6"
      sub_level: "180"
      os_patch_level: "2026-07"
      ksu_variant: "Next"
      ksu_branch: ${{ inputs.kernelsu_branch || '' }}
      use_zram: true
      use_bbg: true
      enable_susfs: true
      cve_2026_43499_patch: true
      droidspaces: "off"
      droidspaces_ntsync: false
