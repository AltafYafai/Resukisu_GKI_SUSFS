# ========================================
# GKI kernel build workflow
# ========================================
# This workflow is responsible for compiling the Android GKI kernel, supporting multiple KernelSU variants and SUSFS
# Called by other workflows through workflow_call, not directly triggered manually
# ========================================

name: Kernel build process

# Adapting to Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      # ==================== Basic configuration ====================
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string

      # ==================== KernelSU Configuration ====================
      ksu_variant:
        required: true
        type: string
      ksu_branch:
        required: true
        type: string

      # ==================== Optional configuration ====================
      version:
        required: false
        type: string
      revision:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"

      # ==================== Function switch ====================
      use_zram:
        required: true
        type: boolean
        default: true
      use_bbg:
        required: true
        type: boolean
        default: true
      use_rekernel:
        required: false
        type: boolean
        default: false
      cve_2026_43499_patch:
        required: false
        type: boolean
        default: true
      enable_susfs:
        required: true
        type: boolean
        default: true
      supp_op:
        required: false
        type: boolean
        default: false
      droidspaces:
        required: false
        type: string
        default: "off"
      droidspaces_ntsync:
        required: false
        type: boolean
        default: false

jobs:
  build-kernel:
    name: "${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.android_version }}-${{ inputs.os_patch_level }}-${{ inputs.ksu_variant }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # ==================== Environment variable configuration ====================
    # ccache configuration is used to speed up repeated compilation
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      # ==================== Build Information Summary ====================
      # Print all configuration information of the current build to facilitate debugging and tracking
      - name: Build information summary
        run: |
          echo "========================================"
          echo "Kernel build configuration summary"
          echo "========================================"
          echo "Android version: ${{ inputs.android_version }}"
          echo "Kernel version: ${{ inputs.kernel_version }}"
          echo "Subversion number: ${{ inputs.sub_level }}"
          echo "Patch Level: ${{ inputs.os_patch_level }}"
          echo "KSU Variant: ${{ inputs.ksu_variant }}"
          echo "KSU branch: ${{ inputs.ksu_branch }}"
          echo "Build time: ${{ inputs.build_time }}"
          echo "SUSFS status: ${{ inputs.enable_susfs }}"
          echo "ZRAM Enhancement: ${{ inputs.use_zram }}"
          echo "BBG patch: ${{ inputs.use_bbg }}"
          echo "Re-Kernel     : ${{ inputs.use_rekernel }}"
          echo "CVE-2026-43499: ${{ inputs.cve_2026_43499_patch }}"
          echo "Droidspaces   : ${{ inputs.droidspaces }}"
          echo "NTSync        : ${{ inputs.droidspaces_ntsync }}"
          echo "Stock Config: Automatically detect config/stock_defconfig"
          echo "========================================"

      # ==================== Clean up disk space ====================
      # GitHub Actions has limited disk space by default and needs to clean up unnecessary pre-installed software.
      - name: Clear disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      # ==================== Check out the warehouse code ====================
      - name: Check out the code repository
        uses: actions/checkout@v6

      # ==================== Initialize the build environment ====================
      # Set various path variables, including kernel source code, patches, tools and other directories
      - name: Initialize the build environment
        run: |
          # Build configuration identifier
          CONFIG="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}"
          KERNEL_ROOT="$GITHUB_WORKSPACE/$CONFIG"
          mkdir -p "$KERNEL_ROOT"

          # Export environment variables to subsequent steps
          cat >> $GITHUB_ENV << EOF
          CONFIG=$CONFIG
          KERNEL_ROOT=$KERNEL_ROOT
          DEFCONFIG=$KERNEL_ROOT/common/arch/arm64/configs/gki_defconfig
          SUSFS4KSU=$GITHUB_WORKSPACE/susfs4ksu
          KERNEL_PATCHES=$GITHUB_WORKSPACE/kernel_patches
          SUKISU_PATCHES=$GITHUB_WORKSPACE/SukiSU_patch
          ZZH_PATCHES=$GITHUB_WORKSPACE
          ANYKERNEL3=$GITHUB_WORKSPACE/AnyKernel3
          ACTION_BUILD=$GITHUB_WORKSPACE/Action-Build
          AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool
          MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py
          UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py
          BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem
          EOF

          # Download and configure the repo tool (used to synchronize Android kernel source code)
          mkdir -p "$GITHUB_WORKSPACE/git-repo"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/git-repo/repo"
          chmod 0755 "$GITHUB_WORKSPACE/git-repo/repo"
          echo "$GITHUB_WORKSPACE/git-repo" >> "$GITHUB_PATH"
          echo "REPO=$GITHUB_WORKSPACE/git-repo/repo" >> $GITHUB_ENV

      # ==================== Display configuration file content ====================
      - name: Display configuration information
        run: |
          CONFIG_FILE="$GITHUB_WORKSPACE/config/config"
          if [ -f "$CONFIG_FILE" ]; then
            echo "Load configuration file: $CONFIG_FILE"
            cat "$CONFIG_FILE"
          fi

      # ==================== Install compilation dependencies ====================
      # Install various tools and libraries required for kernel compilation (accelerated using apt cache)
      - name: Install compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache python3 git curl build-essential libssl-dev bison flex libelf-dev dwarves

      # ==================== Configure ccache ====================
      # ccache is used to cache compilation results and speed up subsequent builds.
      - name: configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      # ==================== Restore ccache cache ====================
      - name: restore ccache cache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-ccache-

      # ==================== Cache Tool Chain ====================
      # Caching AOSP build tools to avoid re-downloading each time
      - name: caching tool chain
        id: cache-toolchain
        uses: actions/cache@v5
        with:
          path: |
            kernel-build-tools
            mkbootimg
          key: toolchain-${{ runner.os }}-v1

      # ==================== Download tool chain ====================
      # Download the kernel build tools and mkbootimg from the AOSP image
      - name: Download tool chain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          AOSP_MIRROR=https://android.googlesource.com
          BRANCH=main-kernel-build-2024
          git clone $AOSP_MIRROR/kernel/prebuilts/build-tools -b $BRANCH --depth 1 kernel-build-tools
          git clone $AOSP_MIRROR/platform/system/tools/mkbootimg -b $BRANCH --depth 1 mkbootimg

      # ==================== Generate signing key ====================
      # Generate RSA key for signing boot.img
      - name: Generate signing key
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 > $BOOT_SIGN_KEY_PATH

      # ==================== Configuring Git ====================
      - name: configure Git
        run: |
          git config --global user.name "BuildBot"
          git config --global user.email "BuildGkiKernel@gmail.com"

      # ==================== Clone dependency repository ====================
      # Clone AnyKernel3, SUSFS, various patch repositories
      - name: Clone dependency repository
        run: |
          ANYKERNEL_BRANCH="master"
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"

          echo "Clone AnyKernel3..."
          git clone https://github.com/ReSukiSU-GKI/AnyKernel3.git -b "master"
          rm -rf AnyKernel3/.git

          echo "Clone SUSFS (branch: $SUSFS_BRANCH)..."
          # ReSukiSU uses simonpunk's original SUSFS
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"

          # Check if custom submission is enabled
          CONFIG_FILE="config/config"
          if [ -f "$CONFIG_FILE" ]; then
            CUSTOM_ENABLED=$(grep "^custom=" "$CONFIG_FILE" | cut -d'=' -f2)
            if [ "$CUSTOM_ENABLED" == "true" ]; then
              CUSTOM_COMMIT=$(grep "^${SUSFS_BRANCH}=" "$CONFIG_FILE" | cut -d'=' -f2)
              if [ -n "$CUSTOM_COMMIT" ]; then
                echo "Switch SUSFS to custom commit: $CUSTOM_COMMIT"
                cd susfs4ksu
                git checkout "$CUSTOM_COMMIT"
                cd ..
              fi
            fi
          fi

          SUSFS_LATEST_COMMIT_DATE=$(git -C susfs4ksu log -1 --date=format:'%Y-%m-%d %H:%M:%S %z' --format='%cd')
          echo "SUSFS_LATEST_COMMIT_DATE=$SUSFS_LATEST_COMMIT_DATE" >> $GITHUB_ENV
          echo "SUSFS warehouse latest commit date: $SUSFS_LATEST_COMMIT_DATE"

          echo "Prepare patch resources..."
          git clone https://github.com/WildKernels/kernel_patches.git
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          echo "Use the current repository patch directory: $ZZH_PATCHES"
          git clone https://github.com/Numbersf/Action-Build.git --depth=1

      # ==================== Initialize and synchronize kernel source code ====================
      # Use the repo tool to obtain the GKI kernel source code from AOSP
      - name: Initialize and synchronize kernel source code
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          # Clone the GCC toolchain (for 5.x kernels)
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-gnu-6.4.1.git gcc

          FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
          echo "Initialize repo, branch: common-${FORMATTED_BRANCH}"

          $REPO init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-${FORMATTED_BRANCH} --repo-rev=v2.16

          # Check if it is a deprecated branch
          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
          DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml

          if grep -q deprecated <<< $REMOTE_BRANCH; then
            echo "Deprecated branch detected: $FORMATTED_BRANCH"
            sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" $DEFAULT_MANIFEST_PATH
          fi

          $REPO --trace sync -c -j$(nproc --all) --no-tags --fail-fast
          echo "REMOTE_BRANCH=$REMOTE_BRANCH" >> $GITHUB_ENV

      # ==================== Disguise /proc/config.gz (auto-detection) ====================
      # If config/stock_defconfig exists in the warehouse, it will be automatically applied; if it does not exist, it will be skipped.
      - name: Apply Stock Config disguise
        run: |
          # The stock_defconfig source and kernel source code target path in the warehouse
          STOCK_SRC="$GITHUB_WORKSPACE/config/stock_defconfig"
          STOCK_DST="$KERNEL_ROOT/common/arch/arm64/configs/stock_defconfig"

          # If stock_defconfig is not provided, it will be skipped directly and will not affect the main process.
          if [ ! -f "$STOCK_SRC" ]; then
            echo "$STOCK_SRC not detected, skipping Stock Config disguise."
            exit 0
          fi

          # Ensure that the target directory exists in advance to avoid cp failure due to missing directories.
          mkdir -p "$(dirname "$STOCK_DST")"
          if ! cp "$STOCK_SRC" "$STOCK_DST"; then
            echo "::error::Failed to copy stock_defconfig: $STOCK_SRC -> $STOCK_DST"
            exit 1
          fi
          echo "Copied stock_defconfig -> $STOCK_DST"

          # Rule replacement target: fixed to common/kernel/Makefile (consistent with the current directory structure)
          NEW_RULE='$(obj)/config_data: arch/arm64/configs/stock_defconfig FORCE'
          OLD_RULE='$(obj)/config_data: $(KCONFIG_CONFIG) FORCE'
          TARGET_MAKEFILE="$KERNEL_ROOT/common/kernel/Makefile"

          # If the target Makefile is not found, it will fail directly to prevent accidental modification of other files.
          if [ ! -f "$TARGET_MAKEFILE" ]; then
            echo "::error::$TARGET_MAKEFILE not found"
            exit 1
          fi

          # Only two states are allowed: Already a new rule / Hit the old rule and replace it; in other cases, an error will be reported
          if grep -qF "$NEW_RULE" "$TARGET_MAKEFILE"; then
            echo "The config_data rule is already stock_defconfig, skipped."
          elif grep -qF "$OLD_RULE" "$TARGET_MAKEFILE"; then
            sed -i 's|\$(obj)/config_data: \$(KCONFIG_CONFIG) FORCE|$(obj)/config_data: arch/arm64/configs/stock_defconfig FORCE|' "$TARGET_MAKEFILE"
            echo "Replaced config_data rule: $TARGET_MAKEFILE"
          else
            echo "::error::Rule not found at $TARGET_MAKEFILE: $OLD_RULE"
            exit 1
          fi

      # ==================== Extract the actual subversion number ====================
      # Read the real SUBLEVEL value from the Makefile
      - name: extract the actual subversion number
        run: |
          ACTUAL_SUBLEVEL="${{ inputs.sub_level }}"
          if [[ -f "$KERNEL_ROOT/common/Makefile" ]]; then
            EXTRACTED=$(grep '^SUBLEVEL = ' "$KERNEL_ROOT/common/Makefile" | awk '{print $3}')
            [[ -n "$EXTRACTED" ]] && ACTUAL_SUBLEVEL="$EXTRACTED"
          fi
          echo "ACTUAL_SUBLEVEL=$ACTUAL_SUBLEVEL" >> $GITHUB_ENV
          echo "Actual subversion number: $ACTUAL_SUBLEVEL"

      # ==================== Apply rtmutex CVE fix chain ====================
      # Judge based on the actual SUBLEVEL after synchronization to avoid repeated patching of LTS that already contains upstream fixes
      - name: Automatically apply CVE-2026-43499 rtmutex fix chain
        if: inputs.cve_2026_43499_patch
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          bash "$GITHUB_WORKSPACE/security_patch/apply_cve_2026_43499.sh" \
            "${{ inputs.kernel_version }}" \
            "$ACTUAL_SUBLEVEL" \
            "$GITHUB_WORKSPACE/security_patch"

      # ==================== Fix glibc 2.38 compatibility issue ====================
      # Some old kernels will have errors when compiled on new versions of glibc and need to be patched
      - name: fix glibc 2.38 compatibility
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          RAW_SUB="${{ inputs.sub_level }}"
          [[ ! "$RAW_SUB" =~ ^[0-9]+$ ]] && CURRENT_SUB=99999 || CURRENT_SUB=$RAW_SUB

          NEEDS_FIX=false
          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.10" && $CURRENT_SUB -le 186 ]] ||
             [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" && $CURRENT_SUB -le 119 ]] ||
             [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" && $CURRENT_SUB -le 43 ]]; then
            NEEDS_FIX=true
          fi

          if [ "$NEEDS_FIX" = true ]; then
            GLIBC_VERSION=$(ldd --version 2>/dev/null | head -n 1 | awk '{print $NF}')
            if [ "$(printf '%s\n' "2.38" "$GLIBC_VERSION" | sort -V | head -n1)" = "2.38" ]; then
              echo "Apply glibc 2.38 compatibility fixes..."
              sed -i '/\$(Q)\$(MAKE) -C \$(SUBCMD_SRC) OUTPUT=\$(abspath \$(dir \$@))\/ \$(abspath \$@)/s//$(Q)$(MAKE) -C $(SUBCMD_SRC) EXTRA_CFLAGS="$(CFLAGS)" OUTPUT=$(abspath $(dir $@))\/ $(abspath $@)/' tools/bpf/resolve_btfids/Makefile 2>/dev/null || true

              if [[ "${{ inputs.kernel_version }}" == "5.10" || "${{ inputs.kernel_version }}" == "5.15" ]]; then
                sed -i '/char \*buf = NULL;/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i 's/for (int i = 0; subcommands\[i\]; i++) {/for (i = 0; subcommands[i]; i++) {/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i '/if (subcommands) {/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i 's/for (int i = 0; subcommands\[i\]; i++)/for (i = 0; subcommands[i]; i++)/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
              fi
            fi
          fi

      # ==================== OnePlus 8E processor support ====================
      # Add support patch for OnePlus 8E processor model
      - name: Add OnePlus 8E processor support
        if: inputs.supp_op
        working-directory: ${{ env.KERNEL_ROOT }}/common/drivers
        run: |
          echo "Download OnePlus 8E support patch..."
          curl -LSs "https://github.com/zzh20188/GKI_KernelSU_SUSFS/raw/refs/heads/dev/hmbird_patch.c" -o hmbird_patch.c
          echo "obj-y += hmbird_patch.o" >> Makefile

      # ==================== Determine KernelSU branch ====================
      # ReSukiSU / KernelSU-Next supports custom branches or commit hashes
      - name: Determine the KernelSU branch
        id: ksu-branch
        run: |
          branch_input="${{ inputs.ksu_branch }}"

          # If the user enters a custom branch name or commit hash, use it directly
          if [ -n "$branch_input" ]; then
            BRANCH="$branch_input"
            echo "Use custom branch/commit: $branch_input"
          else
            BRANCH=""
            echo "No custom branch specified, will use default (latest tag)"
          fi

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "KSU branch: $BRANCH"

      # ==================== Add KernelSU ====================
      - name: 添加 KernelSU
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          case "${{ inputs.ksu_variant }}" in
            "Official")
              echo "Add Official KernelSU..."
              curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash $BRANCH
              ;;
            "Next")
              echo "添加 KernelSU-Next (upstream)..."
              curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash $BRANCH
              # Upstream clones to KernelSU-Next/ but workflow expects KernelSU/
              if [ -d "KernelSU-Next" ] && [ ! -L "KernelSU" ] && [ ! -d "KernelSU" ]; then
                ln -sf KernelSU-Next KernelSU
                echo "[+] Created KernelSU symlink -> KernelSU-Next"
              fi
              ;;
            *)
              echo "Add ReSukiSU..."
              curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash $BRANCH
              ;;
          esac

          if [ -d "KernelSU/.git" ]; then
            KSU_LATEST_COMMIT_DATE=$(git -C KernelSU log -1 --date=format:'%Y-%m-%d %H:%M:%S %z' --format='%cd')
            echo "KSU_LATEST_COMMIT_DATE=$KSU_LATEST_COMMIT_DATE" >> $GITHUB_ENV
            echo "KSU warehouse latest commit date: $KSU_LATEST_COMMIT_DATE"
          else
            echo "KSU_LATEST_COMMIT_DATE=Unknown" >> $GITHUB_ENV
          fi

      # ==================== Fix core_hook.c for SUSFS v2.2.0 API ====================
      # SUSFS v2.2.0 changed function signatures from typed pointers to void __user **,
      # removed DATA_ADB_* auto-detection and deprecated several ioctl commands.
      # KernelSU-Next's next-susfs branch has not been updated to match.
      - name: Fix core_hook.c for SUSFS v2.2.0 API
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          cp "$GITHUB_WORKSPACE/patches/core_hook_fixed.c" "./common/drivers/kernelsu/core_hook.c"
          echo "Applied core_hook.c fix for SUSFS v2.2.0 API"

      # ==================== Apply SUSFS patch ====================
      # SUSFS (Super User SUS FileSystem) is used to hide root traces
      - name: Apply SUSFS patch
        if: inputs.enable_susfs
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          echo "Apply SUSFS patch..."

          cp $SUSFS4KSU/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./common/
          cp $SUSFS4KSU/kernel_patches/fs/* ./common/fs/
          cp $SUSFS4KSU/kernel_patches/include/linux/* ./common/include/linux/

          case "${{ inputs.ksu_variant }}" in
            "Official"|"Next")
              cd ./KernelSU
              cp $SUSFS4KSU/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
              # Compatible with older patches: only replace with kernel/Kbuild if the patch still only modifies kernel/Makefile
              if grep -q '^diff --git a/kernel/Makefile b/kernel/Makefile' ./10_enable_susfs_for_ksu.patch \
                && ! grep -q '^diff --git a/kernel/Kbuild b/kernel/Kbuild' ./10_enable_susfs_for_ksu.patch; then
                sed -i 's|kernel/Makefile|kernel/Kbuild|g' ./10_enable_susfs_for_ksu.patch
              fi
              patch -p1 --forward < 10_enable_susfs_for_ksu.patch || true

              cd ..
              ;;
            "SukiSU"|"ReSukiSU")
              echo "SukiSU/ReSukiSU uses built-in SUSFS support"
              ;;
          esac

          cd $KERNEL_ROOT/common
          CURRENT_SUB="${{ inputs.sub_level }}"
          if [[ ! "$CURRENT_SUB" =~ ^[0-9]+$ ]]; then
            CURRENT_SUB=99999
          fi

          # Temporarily adjust the source code context before applying the main patch, replacing the archived wild fix small patch
          if [[ "${{ inputs.android_version }}" == "android12" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
            if [[ "$CURRENT_SUB" -le 43 ]]; then
              echo "Temporarily adjust Android 12 5.10 base.c context"
              perl -i -pe 's/(int|size_t)\s+this_len\s*=\s*min_t\s*\(\s*\1\s*,/size_t this_len = min_t(size_t,/;' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 117 ]]; then
              echo "Temporarily adjust Android 12 5.10 fdinfo.c context"
              sed -i '/^[[:space:]]*\/\*$/,/^[[:space:]]*u32 mask = mark->mask & IN_ALL_EVENTS;$/d' fs/notify/fdinfo.c
              perl -i -pe 's/\bmask,\s*mark->ignored_mask/inotify_mark_user_mask(mark)/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:%x/ignored_mask:0/g' fs/notify/fdinfo.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
            if [[ "$CURRENT_SUB" -le 107 ]]; then
              echo "Temporarily adjust Android 13 5.10 fdinfo.c context"
              sed -i '/^[[:space:]]*\/\*$/,/^[[:space:]]*u32 mask = mark->mask & IN_ALL_EVENTS;$/d' fs/notify/fdinfo.c
              perl -i -pe 's/\bmask,\s*mark->ignored_mask/inotify_mark_user_mask(mark)/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:%x/ignored_mask:0/g' fs/notify/fdinfo.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" ]]; then
            if [[ "$CURRENT_SUB" -le 41 ]]; then
              echo "Temporarily adjust Android 13 5.15 namespace.c/open.c/fdinfo.c context"
              if ! grep -qF '#include <linux/mnt_idmapping.h>' fs/namespace.c; then
                sed -i '/^#include <linux\/shmem_fs.h>$/a #include <linux/mnt_idmapping.h>' fs/namespace.c
              fi
              if ! grep -qF '#include <linux/mnt_idmapping.h>' fs/open.c; then
                sed -i '/^#include <linux\/compat.h>$/a #include <linux/mnt_idmapping.h>' fs/open.c
              fi
              sed -i '/^[[:space:]]*\/\*$/,/^[[:space:]]*u32 mask = mark->mask & IN_ALL_EVENTS;$/d' fs/notify/fdinfo.c
              perl -i -pe 's/\bmask,\s*mark->ignored_mask/inotify_mark_user_mask(mark)/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:%x/ignored_mask:0/g' fs/notify/fdinfo.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" ]]; then
            if [[ "$CURRENT_SUB" -le 25 ]] && ! grep -qF '#include <trace/hooks/sched.h>' fs/proc/base.c; then
              echo "Temporarily adjust Android 14 6.1 sched.h context"
              sed -i '/^#include <trace\/events\/oom.h>$/a #include <trace/hooks/sched.h>' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 141 ]] && ! grep -qF '#include <linux/dma-buf.h>' fs/proc/base.c; then
              echo "Temporarily adjust Android 14 6.1 dma-buf.h context"
              sed -i '/^#include <linux\/cpufreq_times.h>$/a #include <linux/dma-buf.h>' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -ge 157 ]]; then
              echo "Temporarily adjust Android 14 6.1 namespace.c context"
              sed -i '/^#include <trace\/hooks\/blk.h>$/d' fs/namespace.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android15" && "${{ inputs.kernel_version }}" == "6.6" ]]; then
            if [[ "$CURRENT_SUB" -le 30 ]] && ! grep -qF 'last_vma_end = vma->vm_end;' fs/proc/task_mmu.c; then
              echo "Temporarily adjust Android 15 6.6 task_mmu.c context"
              sed -i '/smap_gather_stats(vma, &mss, last_vma_end);/a\last_vma_end = vma->vm_end;' fs/proc/task_mmu.c
            fi
            if [[ "$CURRENT_SUB" -le 92 ]] && ! grep -qF '#include <linux/dma-buf.h>' fs/proc/base.c; then
              echo "Temporarily adjust Android 15 6.6 base.c context"
              sed -i '/^#include <linux\/cpufreq_times.h>$/a #include <linux/dma-buf.h>' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 57 ]] && ! grep -qF '#include <linux/zswap.h>' mm/memory.c; then
              echo "Temporarily adjust Android 15 6.6 memory.c context"
              sed -i '/^#include <linux\/sched\/sysctl.h>$/a #include <linux/zswap.h>' mm/memory.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android16" && "${{ inputs.kernel_version }}" == "6.12" ]]; then
            if [[ "$CURRENT_SUB" -ge 58 ]]; then
              echo "Temporarily adjust Android 16 6.12 exec.c context"
              sed -i '/^#include <linux\/dma-buf.h>$/d' fs/exec.c
            fi
          fi

          patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true

          # Restore the temporary context after the main patch is applied to prevent irrelevant source code differences from being retained in the final product
          if [[ "${{ inputs.android_version }}" == "android12" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
            if [[ "$CURRENT_SUB" -le 43 ]]; then
              echo "Restore Android 12 5.10 base.c temporary tweaks"
              sed -i 's/^size_t this_len = min_t(size_t, count, PAGE_SIZE);$/int this_len = min_t(int, count, PAGE_SIZE);/' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 117 ]]; then
              echo "Restore Android 12 5.10 fdinfo.c temporary tweaks"
              perl -i -pe 's/^(\s+if \(inode\) \{)/$1\n\t\t\/\*\n\t\t * IN_ALL_EVENTS represents all of the mask bits\n\t\t * that we expose to userspace.  There is at\n\t\t * least one bit (FS_EVENT_ON_CHILD) which is\n\t\t * used only internally to the kernel.\n\t\t *\/\n\t\tu32 mask = mark->mask & IN_ALL_EVENTS;/m' fs/notify/fdinfo.c
              perl -i -pe 's/\binotify_mark_user_mask\(mark\)/mask, mark->ignored_mask/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:0/ignored_mask:%x/g' fs/notify/fdinfo.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
            if [[ "$CURRENT_SUB" -le 107 ]]; then
              echo "Restore Android 13 5.10 fdinfo.c temporary adjustments"
              perl -i -pe 's/^(\s+if \(inode\) \{)/$1\n\t\t\/\*\n\t\t * IN_ALL_EVENTS represents all of the mask bits\n\t\t * that we expose to userspace.  There is at\n\t\t * least one bit (FS_EVENT_ON_CHILD) which is\n\t\t * used only internally to the kernel.\n\t\t *\/\n\t\tu32 mask = mark->mask & IN_ALL_EVENTS;/m' fs/notify/fdinfo.c
              perl -i -pe 's/\binotify_mark_user_mask\(mark\)/mask, mark->ignored_mask/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:0/ignored_mask:%x/g' fs/notify/fdinfo.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" ]]; then
            if [[ "$CURRENT_SUB" -le 41 ]]; then
              echo "Restore Android 13 5.15 temporary adjustments"
              sed -i '/#include <linux\/mnt_idmapping.h>$/d' fs/namespace.c
              sed -i '/#include <linux\/mnt_idmapping.h>$/d' fs/open.c
              perl -i -pe 's/^(\s+if \(inode\) \{)/$1\n\t\t\/\*\n\t\t * IN_ALL_EVENTS represents all of the mask bits\n\t\t * that we expose to userspace.  There is at\n\t\t * least one bit (FS_EVENT_ON_CHILD) which is\n\t\t * used only internally to the kernel.\n\t\t *\/\n\t\tu32 mask = mark->mask & IN_ALL_EVENTS;/m' fs/notify/fdinfo.c
              perl -i -pe 's/\binotify_mark_user_mask\(mark\)/mask, mark->ignored_mask/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:0/ignored_mask:%x/g' fs/notify/fdinfo.c
              sed -i 's|i_uid_into_mnt(i_user_ns(&fi->inode), &fi->inode).val|i_uid_into_mnt(\&init_user_ns, \&fi->inode).val|g' fs/susfs.c
              sed -i 's|i_uid_into_mnt(i_user_ns(inode), inode).val|i_uid_into_mnt(\&init_user_ns, inode).val|g' fs/susfs.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" ]]; then
            if [[ "$CURRENT_SUB" -le 25 ]]; then
              sed -i '/^#include <trace\/hooks\/sched.h>$/d' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 141 ]]; then
              echo "Restore Android 14 6.1 base.c temporary tweaks"
              sed -i '/^#include <linux\/dma-buf.h>$/d' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -ge 157 ]] && ! grep -qF '#include <trace/hooks/blk.h>' fs/namespace.c; then
              echo "Restore Android 14 6.1 namespace.c temporary tweaks"
              sed -i '/^#include "internal.h"$/a #include <trace/hooks/blk.h>' fs/namespace.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android15" && "${{ inputs.kernel_version }}" == "6.6" ]]; then
            if [[ "$CURRENT_SUB" -le 92 ]]; then
              echo "Restore Android 15 6.6 base.c temporary adjustments"
              sed -i '/^#include <linux\/dma-buf.h>$/d' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 57 ]]; then
              echo "Restore Android 15 6.6 memory.c temporary adjustments"
              sed -i '/^#include <linux\/zswap.h>$/d' mm/memory.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android16" && "${{ inputs.kernel_version }}" == "6.12" ]]; then
            if [[ "$CURRENT_SUB" -ge 58 ]] && ! grep -qF '#include <linux/dma-buf.h>' fs/exec.c; then
              echo "Restore Android 16 6.12 exec.c temporary adjustments"
              sed -i '0,/^#include /s//#include <linux\/dma-buf.h>\n&/' fs/exec.c
            fi
          fi

          if [ "${{ inputs.ksu_variant }}" == "Official" ] || [ "${{ inputs.ksu_variant }}" == "Next" ] || [ "${{ inputs.ksu_variant }}" == "SukiSU" ] || [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ]; then
            # Android 12 - 5.10 fixes
            if [[ "${{ inputs.android_version }}" == "android12" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
              # Fix 2024-11 branch: mmap.c calls vm_flags_clear(), but the same branch mm.h does not provide helper
              if [[ "${{ inputs.os_patch_level }}" == "2024-11" ]] && grep -qF 'vm_flags_clear(new_vma, VM_PAD_MASK);' ./mm/mmap.c; then
                sed -i 's/vm_flags_clear(new_vma, VM_PAD_MASK);/new_vma->vm_flags \&= ~VM_PAD_MASK;/' ./mm/mmap.c
              fi
              if [[ "$CURRENT_SUB" -le 209 ]]; then
                sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
              fi
            fi

            # Android 13 - 5.15 fixes
            if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" ]]; then
              # Fix 2024-11 branch: mmap.c calls vm_flags_clear(), but the same branch mm.h does not provide helper
              if [[ "${{ inputs.os_patch_level }}" == "2024-11" ]] && grep -qF 'vm_flags_clear(new_vma, VM_PAD_MASK);' ./mm/mmap.c; then
                sed -i 's/vm_flags_clear(new_vma, VM_PAD_MASK);/new_vma->vm_flags \&= ~VM_PAD_MASK;/' ./mm/mmap.c
              fi
              if [[ "$CURRENT_SUB" -le 148 && "${{ inputs.os_patch_level }}" != "2024-05" ]]; then
                sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
              fi
              # Fix 5.15 LTS: task_mmu.c header hunk mismatch, resulting in missing declaration of SUSFS macro
              if grep -q 'SUSFS_IS_INODE_SUS_MAP\|SUSFS_IS_INODE_OPEN_REDIRECT' ./fs/proc/task_mmu.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/proc/task_mmu.c; then
                if grep -qF '#include <linux/pkeys.h>' ./fs/proc/task_mmu.c; then
                  sed -i '/#include <linux\/pkeys.h>/a #if defined(CONFIG_KSU_SUSFS_SUS_KSTAT) || defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)\n#include <linux\/susfs_def.h>\n#endif' ./fs/proc/task_mmu.c
                elif grep -qF '#include <linux/uaccess.h>' ./fs/proc/task_mmu.c; then
                  sed -i '/#include <linux\/uaccess.h>/a #if defined(CONFIG_KSU_SUSFS_SUS_KSTAT) || defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)\n#include <linux\/susfs_def.h>\n#endif' ./fs/proc/task_mmu.c
                else
                  sed -i '0,/^#include /s//#if defined(CONFIG_KSU_SUSFS_SUS_KSTAT) || defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)\n#include <linux\/susfs_def.h>\n#endif\n&/' ./fs/proc/task_mmu.c
                fi
                echo "Fixed Android 13 5.15 task_mmu.c missing susfs_def.h issue"
              fi
              # Fix 5.15 LTS: SUSFS patch fails in namespace.c header hunk due to context mismatch,
              # Causes SUSFS symbols (DEFAULT_KSU_MNT_ID, etc.) in the function body to be undeclared
              if grep -q 'DEFAULT_KSU_MNT_ID\|susfs_mnt_id_ida' ./fs/namespace.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/namespace.c; then
                echo "Missing susfs_def.h detected in namespace.c, injection declaration..."
                sed -i '/#include <linux\/mnt_idmapping.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n#include <linux\/susfs_def.h>\n#endif' ./fs/namespace.c
                if ! grep -q 'extern bool susfs_is_current_ksu_domain' ./fs/namespace.c; then
                  sed -i '/#include "internal.h"/a \\n#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\nextern bool susfs_is_current_ksu_domain(void);\nextern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;\n\n#define CL_COPY_MNT_NS BIT(25)\n\n#endif' ./fs/namespace.c
                fi
              fi
            fi

            # Android 14 - 6.1 fixes
            if [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" ]]; then
              if grep -q 'susfs_is_current_proc_umounted\|SUSFS_IS_INODE_SUS_MAP\|SUSFS_IS_INODE_OPEN_REDIRECT' ./fs/proc/base.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/proc/base.c; then
                if grep -qF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
                  sed -i '/#include <linux\/dma-buf.h>/a #if defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)\n#include <linux\/susfs_def.h>\n#endif' ./fs/proc/base.c
                else
                  sed -i '/#include <linux\/cpufreq_times.h>/a #if defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)\n#include <linux\/susfs_def.h>\n#endif' ./fs/proc/base.c
                fi
              fi
              if [[ "$CURRENT_SUB" -le 75 && "${{ inputs.os_patch_level }}" != "2024-05" ]]; then
                sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
              fi
              # Fix 6.1 LTS: SUSFS patch fails in namespace.c header hunk due to context mismatch,
              # Causes SUSFS symbols (DEFAULT_KSU_MNT_ID, etc.) in the function body to be undeclared
              if grep -q 'DEFAULT_KSU_MNT_ID\|susfs_mnt_id_ida' ./fs/namespace.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/namespace.c; then
                echo "Missing susfs_def.h detected in namespace.c, injection declaration..."
                sed -i '/#include <linux\/mnt_idmapping.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n#include <linux\/susfs_def.h>\n#endif' ./fs/namespace.c
                if ! grep -q 'extern bool susfs_is_current_ksu_domain' ./fs/namespace.c; then
                  sed -i '/#include "internal.h"/a \\n#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\nextern bool susfs_is_current_ksu_domain(void);\nextern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;\n\n#define CL_COPY_MNT_NS BIT(25)\n\n#endif' ./fs/namespace.c
                fi
              fi
            fi

            # Android 15 - 6.6 fixes
            if [[ "${{ inputs.android_version }}" == "android15" && "${{ inputs.kernel_version }}" == "6.6" ]]; then
              # Fix 6.6.50~6.6.97: fs/proc/base.c header hunk mismatch, resulting in susfs_def.h missing
              if grep -q 'AS_FLAGS_SUS_MAP\|susfs_is_current_proc_umounted\|SUSFS_IS_INODE_SUS_MAP\|SUSFS_IS_INODE_OPEN_REDIRECT' ./fs/proc/base.c && ! grep -qF 'susfs_def.h' ./fs/proc/base.c; then
                if ! grep -qF '#include <linux/dma-buf.h>' ./fs/proc/base.c; then
                  sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' ./fs/proc/base.c
                fi
                sed -i '/#include <linux\/dma-buf.h>/a #endif' ./fs/proc/base.c
                sed -i '/#include <linux\/dma-buf.h>/a #include <linux\/susfs_def.h>' ./fs/proc/base.c
                sed -i '/#include <linux\/dma-buf.h>/a #if defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)' ./fs/proc/base.c
              fi
              # Repair 6.6 early branch: memory.c header context is missing zswap.h, causing the SUSFS header file hunk to be missed.
              if grep -q 'SUSFS_IS_INODE_SUS_MAP' ./mm/memory.c && ! grep -qF '#include <linux/susfs_def.h>' ./mm/memory.c; then
                if grep -qF '#include <linux/zswap.h>' ./mm/memory.c; then
                  sed -i '/#include <linux\/zswap.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MAP\n#include <linux\/susfs_def.h>\n#endif' ./mm/memory.c
                else
                  sed -i '/#include <linux\/sched\/sysctl.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MAP\n#include <linux\/susfs_def.h>\n#endif' ./mm/memory.c
                fi
              fi
            fi

            # Android 16 - 6.12 fixes
            if [[ "${{ inputs.android_version }}" == "android16" && "${{ inputs.kernel_version }}" == "6.12" ]]; then
              # Fix duplicate definition of setuid_hook.c
              SETUID_HOOK="$KERNEL_ROOT/common/drivers/kernelsu/setuid_hook.c"
              if [ -f "$SETUID_HOOK" ]; then
                sed -i 's/defined(CONFIG_KSU_MANUAL_HOOK))/!defined(CONFIG_KSU_SUSFS) \&\& defined(CONFIG_KSU_MANUAL_HOOK))/' "$SETUID_HOOK"
                echo "Fixed setuid_hook.c duplicate definition issue"
              fi

              # Fix 6.12.58+: exec.c header context change causes SUSFS patch to miss susfs_def.h
              if grep -q 'susfs_is_current_proc_umounted' ./fs/exec.c && ! grep -qF '#include <linux/susfs_def.h>' ./fs/exec.c; then
                if grep -qF '#include <linux/dma-buf.h>' ./fs/exec.c; then
                  sed -i '/#include <linux\/dma-buf.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' ./fs/exec.c
                else
                  sed -i '/#include <linux\/ksm.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' ./fs/exec.c
                fi
                echo "Fixed exec.c missing susfs_def.h issue"
              fi
            fi
          fi

      - name: Clone Droidspaces patch repository
        if: inputs.droidspaces != 'off'
        run: |
          git clone --depth 1 https://github.com/ravindu644/Droidspaces-OSS.git /tmp/Droidspaces-OSS
          echo "DROIDSPACES_PATCHES=/tmp/Droidspaces-OSS/Documentation/resources/kernel-patches/GKI" >> $GITHUB_ENV

      # ==================== Back up original defconfig ====================
      # Used for subsequent generation of defconfig fragment (bazel trim compatible)
      - name: backup original defconfig
        run: cp "$DEFCONFIG" "$DEFCONFIG.orig"

      - name: Integrated Droidspaces support
        if: inputs.droidspaces != 'off'
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          KERNEL_VER="${{ inputs.kernel_version }}"
          SLOT="${{ inputs.droidspaces }}"

          # 678 -> 6_7_8, 123 -> 1_2_3, 345 -> 3_4_5
          SLOT_NAME=$(echo "$SLOT" | sed 's/\(.\)/\1_/g; s/_$//')
          echo "Apply Droidspaces SYSVIPC kABI fix (slot: $SLOT / $SLOT_NAME)..."
          case "$KERNEL_VER" in
            6.12)
              PATCH_FILE="$DROIDSPACES_PATCHES/kernel-6.12/001.GKI-6.12-or-above-fix_sysvipc_kabi.patch"
              ;;
            5.10|5.15|6.1|6.6)
              PATCH_FILE="$DROIDSPACES_PATCHES/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_${SLOT_NAME}.patch"
              ;;
            *)
              echo "::warning::Droidspaces: Unadapted kernel version $KERNEL_VER, skipping patch"
              exit 0
              ;;
          esac
          if ! patch -p1 --forward < "$PATCH_FILE"; then
            echo "::warning::SYSVIPC kABI patch application failed, may have already been applied or context mismatch"
          fi

          # 5.10 and below also require kABI fix for POSIX_MQUEUE
          if [ "$KERNEL_VER" = "5.10" ]; then
            echo "Apply Droidspaces POSIX_MQUEUE kABI fix (5.10)..."
            POSIX_PATCH="$DROIDSPACES_PATCHES/below-kernel-6.12/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch"
            if ! patch -p1 --forward < "$POSIX_PATCH"; then
              echo "::warning::POSIX_MQUEUE kABI patch application failed, may have already been applied or the context does not match"
            fi
          fi

          # rust_binder.ko for Android 16/6.12 references when IPC_NS is enabled
          # init_ipc_ns and put_ipc_ns, but these two symbols are not yet exported by the current AOSP common branch.
          # Complete the export here to avoid modpost failure due to undefined symbol.
          if [ "$KERNEL_VER" = "6.12" ]; then
            if [ -f "ipc/msgutil.c" ] && ! grep -qF 'EXPORT_SYMBOL(init_ipc_ns);' "ipc/msgutil.c"; then
              sed -i '/^struct msg_msgseg {/i EXPORT_SYMBOL(init_ipc_ns);' "ipc/msgutil.c"
              echo "Supplementary symbols exported for init_ipc_ns"
            fi

            if [ -f "ipc/namespace.c" ] && ! grep -qF 'EXPORT_SYMBOL(put_ipc_ns);' "ipc/namespace.c"; then
              sed -i '/^static struct ns_common \*ipcns_get(/i EXPORT_SYMBOL(put_ipc_ns);' "ipc/namespace.c"
              echo "Supplementary symbols exported for put_ipc_ns"
            fi
          fi

          echo "Add Droidspaces kernel configuration..."
          # Process one by one according to document rules: skip if enabled, replace if "# not set" does not exist, append if it does not exist
          enable_config() {
            local cfg="$1"
            if grep -q "^${cfg}=y" "$DEFCONFIG"; then
              echo "Enabled: $cfg"
            elif grep -q "^# ${cfg} is not set" "$DEFCONFIG"; then
              sed -i "s/^# ${cfg} is not set$/${cfg}=y/" "$DEFCONFIG"
              echo "Switched: $cfg"
            else
              echo "${cfg}=y" >> "$DEFCONFIG"
              echo "Added: $cfg"
            fi
          }

          config_defined() {
            local name="${1#CONFIG_}"
            grep -RqsE --include='Kconfig*' "^[[:space:]]*(menuconfig|config)[[:space:]]+${name}$" .
          }

          enable_config_if_defined() {
            local cfg="$1"
            if config_defined "$cfg"; then
              enable_config "$cfg"
            else
              echo "Undefined in current kernel: $cfg, skipped"
            fi
          }

          # Necessary configuration
          enable_config CONFIG_SYSVIPC
          enable_config CONFIG_POSIX_MQUEUE
          enable_config CONFIG_IPC_NS
          enable_config CONFIG_PID_NS
          enable_config CONFIG_DEVTMPFS

          # Optional: Network related configuration (Docker/NAT mode)
          enable_config_if_defined CONFIG_NETFILTER_XT_MATCH_ADDRTYPE
          enable_config_if_defined CONFIG_NETFILTER_XT_TARGET_LOG
          enable_config_if_defined CONFIG_NETFILTER_XT_MATCH_RECENT
          enable_config_if_defined CONFIG_IP_SET
          enable_config_if_defined CONFIG_IP_SET_HASH_IP
          enable_config_if_defined CONFIG_IP_SET_HASH_NET
          enable_config_if_defined CONFIG_NETFILTER_XT_SET

          # The symbolic name of the REJECT target may be different on different kernel versions. Enable it according to the actual configuration.
          enable_config_if_defined CONFIG_NETFILTER_XT_TARGET_REJECT
          enable_config_if_defined CONFIG_IP_NF_TARGET_REJECT

          echo "Droidspaces integration completed"

          echo "GKI6.6 special configuration for ordinary user networking (Droidspaces)"
          # Specifically handles =n type configuration (Android network permissions must be turned off)
          disable_config() {
            local cfg="$1"
            if grep -q "^${cfg}=n" "$DEFCONFIG"; then
              echo "Disabled: $cfg"
            elif grep -q "^${cfg}=y" "$DEFCONFIG"; then
              sed -i "s/^${cfg}=y$/${cfg}=n/" "$DEFCONFIG"
              echo "Closed: $cfg"
            else
              echo "# ${cfg} is not set" >> "$DEFCONFIG"
              echo "Added and disabled: $cfg"
            fi
          }

          if [[ "${{ inputs.android_version }}" == "android15" && "${{ inputs.kernel_version }}" == "6.6" ]]; then
            # 1. Enable user namespace (required)
            # enable_config_if_defined CONFIG_USER_NS
            # 2. Turn off Android Strict Network Control (required)
            disable_config CONFIG_ANDROID_PARANOID_NETWORK
          fi

      - name: Inject NTSync kernel configuration
        if: inputs.droidspaces != 'off' && inputs.droidspaces_ntsync
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          set -e
          echo "=== Start injecting NTSync kernel patch ==="
          echo "Android version: ${{ inputs.android_version }}"
          echo "Kernel version: ${{ inputs.kernel_version }}"

          case "${{ inputs.android_version }}-${{ inputs.kernel_version }}" in
            android12-5.10)
              NTSYNC_PATCH="ntsync_compat_android12-5.10"
              ;;
            android13-5.15)
              NTSYNC_PATCH="ntsync_compat_android13-5.15"
              ;;
            android14-6.1)
              NTSYNC_PATCH="ntsync_compat_android14-6.1"
              ;;
            android15-6.6)
              NTSYNC_PATCH="ntsync_compat_android15-6.6"
              ;;
            android16-6.12)
              NTSYNC_PATCH="ntsync_compat_android16-6.12"
              ;;
            *)
              echo "::warning::NTSync: Not adapted to ${{ inputs.android_version }} / ${{ inputs.kernel_version }}, skip patch"
              exit 0
              ;;
          esac

          echo "Automatically select NTSync patch: ${NTSYNC_PATCH}.patch"
          wget -q "https://raw.githubusercontent.com/Goldzxcbug/Droidspaces_Kernel_patch/refs/heads/main/NTsync/ntsync_base.patch"
          wget -q "https://raw.githubusercontent.com/Goldzxcbug/Droidspaces_Kernel_patch/refs/heads/main/NTsync/${NTSYNC_PATCH}.patch"

          patch -p1 < "ntsync_base.patch"
          patch -p1 < "${NTSYNC_PATCH}.patch"

          cd ..

          # Configuration path
          CONFIG_PATH="./common/arch/arm64/configs/gki_defconfig"
          echo "Checking and enabling CONFIG_NTSYNC..."

          # Remove the unenabled flag and add enabled items to ensure idempotence during repeated runs.
          sed -i '/CONFIG_NTSYNC is not set/d' "$CONFIG_PATH"
          if ! grep -q "^CONFIG_NTSYNC=y" "$CONFIG_PATH"; then
            echo "CONFIG_NTSYNC=y" >> "$CONFIG_PATH"
            echo "✅ CONFIG_NTSYNC enabled successfully"
          else
            echo "✅ CONFIG_NTSYNC is enabled"
          fi

          echo "=== NTSync patch and configuration injection completed ==="

      - name: Apply Unicode bypass fix
        if: inputs.enable_susfs
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          if [ "${{ inputs.kernel_version }}" = "5.10" ] || [ "${{ inputs.kernel_version }}" = "5.15" ]; then
            patch -p1 --forward < "$ACTION_BUILD/patches/unicode_bypass_fix_6.1-.patch" || true
          else
            patch -p1 --forward < "$ACTION_BUILD/patches/unicode_bypass_fix_6.1+.patch" || true
          fi

      # ==================== Upgrade LZ4 and apply LZ4KD/LZ4K_OPLUS patch ====================
      # Unified processing of ZRAM-related LZ4 changes to reduce repeated steps
      - name: Configure ZRAM LZ4 patch stack
        if: inputs.use_zram
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          # Phase 1: Upgrade LZ4 to 1.10.0 and add ARM64 NEON acceleration
          echo "Upgrade LZ4..."
          rm -f lib/lz4/lz4_compress.c lib/lz4/lz4_decompress.c lib/lz4/lz4defs.h lib/lz4/lz4hc_compress.c

          cp -r $ZZH_PATCHES/zram/lz4/* ./lib/lz4/
          cp -r $ZZH_PATCHES/zram/include/linux/* ./include/linux/
          bash $ZZH_PATCHES/zram/apply_lz4_neon.sh

          if [ -f "fs/f2fs/Makefile" ] && ! grep -qF "f2fs-\$(CONFIG_F2FS_IOSTAT) += iostat.o" "fs/f2fs/Makefile"; then
            echo "f2fs-\$(CONFIG_F2FS_IOSTAT) += iostat.o" >> "fs/f2fs/Makefile"
          fi

          # Phase 2: Apply LZ4KD and LZ4K_OPLUS patches
          cp -r $SUKISU_PATCHES/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r $SUKISU_PATCHES/other/zram/lz4k/lib/* ./lib/
          cp -r $SUKISU_PATCHES/other/zram/lz4k/crypto/* ./crypto/
          cp -r $SUKISU_PATCHES/other/zram/lz4k_oplus ./lib/

          cp $SUKISU_PATCHES/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4kd.patch ./
          if ! patch -p1 -F 3 < lz4kd.patch; then
            echo "::warning::lz4kd.patch failed to apply, possibly already applied or context mismatch"
          fi

          cp $SUKISU_PATCHES/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4k_oplus.patch ./
          if ! patch -p1 -F 3 < lz4k_oplus.patch; then
            echo "::warning::lz4k_oplus.patch failed to apply, possibly already applied or context mismatch"
          fi

      # ==================== Fix 6.6 WiFi/Bluetooth compatibility (Samsung + Xiaomi) ====================
      # Merge Samsung and Xiaomi fixes, and use idempotent writing to avoid dirty changes caused by repeated additions
      - name: Fix 6.6 WiFi/Bluetooth compatibility (Samsung + Xiaomi)
        if: inputs.kernel_version == '6.6'
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          # Append only if the line does not exist to avoid polluting the file with repeated executions
          ensure_line_once() {
            local file="$1"
            local line="$2"
            if [ ! -f "$file" ]; then
              echo "::error::File does not exist: $file"
              exit 1
            fi
            if ! grep -qF "$line" "$file"; then
              echo "$line" >> "$file"
            fi
          }

          GALAXY_SYMBOL_LIST="android/abi_gki_aarch64_galaxy"
          XIAOMI_SYMBOL_LIST="android/abi_gki_aarch64_xiaomi"
          DRIVERS_MAKEFILE="drivers/Makefile"
          MIN_KDP_SRC="$KERNEL_PATCHES/samsung/min_kdp/min_kdp.c"
          MIN_KDP_PATCH="$KERNEL_PATCHES/samsung/min_kdp/add-min_kdp-symbols.patch"
          MIN_KDP_DST="drivers/min_kdp.c"

          # Samsung: Supplementary KDP notation (idempotent)
          ensure_line_once "$GALAXY_SYMBOL_LIST" "kdp_set_cred_non_rcu"
          ensure_line_once "$GALAXY_SYMBOL_LIST" "kdp_usecount_dec_and_test"
          ensure_line_once "$GALAXY_SYMBOL_LIST" "kdp_usecount_inc"

          # Samsung: Only patch if applicable, skip if already applied/does not match
          if [ ! -f "$MIN_KDP_PATCH" ]; then
            echo "::error::Patch does not exist: $MIN_KDP_PATCH"
            exit 1
          fi
          if patch -p1 --dry-run < "$MIN_KDP_PATCH" >/dev/null 2>&1; then
            patch -p1 --no-backup-if-mismatch < "$MIN_KDP_PATCH"
          else
            echo "min_kdp symbols patch has been applied or does not match the current context, skipped."
          fi

          # Samsung: Copy the driver source code and make sure the Makefile is appended only once
          if [ ! -f "$MIN_KDP_SRC" ]; then
            echo "::error::File does not exist: $MIN_KDP_SRC"
            exit 1
          fi
          cp "$MIN_KDP_SRC" "$MIN_KDP_DST"
          ensure_line_once "$DRIVERS_MAKEFILE" "obj-y += min_kdp.o"

          # Xiaomi: Supplementary symbols (idempotent)
          ensure_line_once "$XIAOMI_SYMBOL_LIST" "device_find_any_child"

      # ==================== Configure ZRAM options ====================
      # Enable various ZRAM compression algorithms
      - name: configure ZRAM options
        if: inputs.use_zram
        run: |
          CONFIG_FILE="$DEFCONFIG"

          # 5.10 requires additional basic configuration
          if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
            cat >> "$CONFIG_FILE" <<'EOF'
          CONFIG_ZSMALLOC=y
          CONFIG_ZRAM=y
          CONFIG_MODULE_SIG=n
          CONFIG_CRYPTO_LZO=y
          CONFIG_ZRAM_DEF_COMP_LZ4KD=y
          EOF
          fi

          # 5.15/6.1: Change module to built-in
          if [ "${{ inputs.kernel_version }}" != "6.6" ] && [ "${{ inputs.kernel_version }}" != "5.10" ]; then
            if grep -q "CONFIG_ZSMALLOC" "$CONFIG_FILE"; then
              sed -i 's/CONFIG_ZSMALLOC=m/CONFIG_ZSMALLOC=y/g' "$CONFIG_FILE"
            else
              echo "CONFIG_ZSMALLOC=y" >> "$CONFIG_FILE"
            fi
            sed -i 's/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g' "$CONFIG_FILE"
          fi

          # 6.6: Change the module to built-in
          if [ "${{ inputs.kernel_version }}" = "6.6" ]; then
            echo "CONFIG_ZSMALLOC=y" >> "$CONFIG_FILE"
            sed -i 's/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g' "$CONFIG_FILE"
          fi

          # android14/15: Remove zram/zsmalloc module declaration from modules.bzl
          if [ "${{ inputs.android_version }}" = "android14" ] || [ "${{ inputs.android_version }}" = "android15" ]; then
            sed -i 's/"drivers\/block\/zram\/zram\.ko",//g; s/"mm\/zsmalloc\.ko",//g' "$KERNEL_ROOT/common/modules.bzl"
          fi

          # Enable compression algorithm (use standalone fragment files)
          if grep -q "CONFIG_ZSMALLOC=y" "$CONFIG_FILE" && grep -q "CONFIG_ZRAM=y" "$CONFIG_FILE"; then
            cat "$ZZH_PATCHES/config/zram.config" >> "$CONFIG_FILE"
          fi

      # ==================== Add BBG anti-block machine patch ====================
      # BBG (Baseband Guard) prevents baseband formatting attacks
      - name: Add BBG anti-blocker machine patch
        if: inputs.use_bbg
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> common/arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' common/security/Kconfig

      # ==================== Application Re-Kernel ====================
      # Re-Kernel provides kernel-level protection via GKI Vendor Hooks
      - name: Application Re-Kernel
        if: inputs.use_rekernel
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -e
          echo "Integrating Re-Kernel..."
          TMP_REKERNEL=/tmp/rekernel
          rm -rf "$TMP_REKERNEL"
          git clone --depth 1 https://github.com/Sakion-Team/Re-Kernel.git "$TMP_REKERNEL"

          # Prepare driver source code
          mkdir -p common/drivers/rekernel
          cp "$TMP_REKERNEL/Integrate/rekernel/rekernel.c" common/drivers/rekernel/
          cp "$TMP_REKERNEL/Integrate/rekernel/rekernel.h" common/drivers/rekernel/

          # Generate build configuration
          cat > common/drivers/rekernel/Kconfig << 'EOF'
          menu "Re:Kernel"
          config REKERNEL
              bool "Re:Kernel support (GKI Vendor Hooks)"
              default y
              help
                Enable Re-Kernel support via GKI Vendor Hooks.

          config REKERNEL_NETWORK
              bool "Re:Kernel NetReceive unfreeze support"
              depends on REKERNEL
              default n
          endmenu
          EOF

          cat > common/drivers/rekernel/Makefile << 'EOF'
          obj-$(CONFIG_REKERNEL) += rekernel.o
          ccflags-$(CONFIG_REKERNEL_NETWORK) += -DNETWORK_FILTER
          EOF

          # Mount to driver tree
          if ! grep -qF 'source "drivers/rekernel/Kconfig"' common/drivers/Kconfig; then
            sed -i '/^endmenu$/i source "drivers/rekernel/Kconfig"' common/drivers/Kconfig
          fi
          if ! grep -qF 'obj-$(CONFIG_REKERNEL) += rekernel/' common/drivers/Makefile; then
            echo 'obj-$(CONFIG_REKERNEL) += rekernel/' >> common/drivers/Makefile
          fi

          # Enable kernel version macro
          REKERNEL_H="common/drivers/rekernel/rekernel.h"
          VERSION_MACRO="KERNEL_$(echo "${{ inputs.kernel_version }}" | tr '.' '_')"
          if grep -q "^// #define ${VERSION_MACRO}$" "$REKERNEL_H"; then
            sed -i "s|^// #define ${VERSION_MACRO}$|#define ${VERSION_MACRO}|" "$REKERNEL_H"
          fi

          # Correct header file inclusion path (adapted to in-tree compilation)
          sed -i 's|#include <../android/binder_internal.h>|#include "../../drivers/android/binder_internal.h"|g' common/drivers/rekernel/rekernel.c
          # Complete binder_internal dependency (avoid DEFINE_SHOW_ATTRIBUTE error under 5.10)
          grep -qF '#include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c || sed -i '/#include <trace\/hooks\/signal.h>/a #include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c

          # Configuration defconfig (idempotent)
          grep -q '^CONFIG_REKERNEL=y$' "$DEFCONFIG" || echo "CONFIG_REKERNEL=y" >> "$DEFCONFIG"
          grep -q '^CONFIG_REKERNEL_NETWORK=y$' "$DEFCONFIG" || echo "CONFIG_REKERNEL_NETWORK=y" >> "$DEFCONFIG"

      # ==================== Configure kernel options ====================
      # Add KernelSU and other necessary kernel configuration
      - name: configure kernel options
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          EOF

          if [ "${{ inputs.ksu_variant }}" == "SukiSU" ] || [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ] || [ "${{ inputs.ksu_variant }}" == "Next" ]; then
            if [[ "${{ inputs.use_kpm }}" == enabled* ]] || [[ "${{ inputs.use_kpm }}" == patched* ]]; then
              if ! grep -RqsE '^[[:space:]]*config[[:space:]]+KPM([[:space:]]|$)' common KernelSU 2>/dev/null; then
                echo "Error: Enablement of KPM has been requested, but the current KernelSU code does not declare CONFIG_KPM" >&2
                exit 1
              fi
              echo "CONFIG_KPM=y" >> "$DEFCONFIG"
            fi
          fi

          CURRENT_SUB="${{ inputs.sub_level }}"
          if [[ ! "$CURRENT_SUB" =~ ^[0-9]+$ ]]; then
            CURRENT_SUB=99999
          fi
          if [[ ("${{ inputs.ksu_variant }}" == "ReSukiSU" || "${{ inputs.ksu_variant }}" == "Next") && "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" && "$CURRENT_SUB" -ge 74 && "$CURRENT_SUB" -le 137 ]]; then
            {
              echo "CONFIG_KALLSYMS=y"
              echo "CONFIG_KALLSYMS_ALL=y"
            } >> "$DEFCONFIG"
            # Fix 5.15.74~5.15.137: kallsyms_on_each_symbol is only compiled under LIVEPATCH, causing ReSukiSU link failure
            KALLSYMS_C="./common/kernel/kallsyms.c"
            if [ -f "$KALLSYMS_C" ] \
              && grep -qF 'int kallsyms_on_each_symbol' "$KALLSYMS_C" \
              && grep -qF '#endif /* CONFIG_LIVEPATCH */' "$KALLSYMS_C"; then
              sed -i '/^#ifdef CONFIG_LIVEPATCH$/,/^int kallsyms_on_each_symbol/ { /^#ifdef CONFIG_LIVEPATCH$/d }' "$KALLSYMS_C"
              sed -i '/^int kallsyms_on_each_symbol/,/^#endif \/\* CONFIG_LIVEPATCH \*\// { /^#endif \/\* CONFIG_LIVEPATCH \*\//d }' "$KALLSYMS_C"
              echo "Fixed LIVEPATCH compilation limitation for kallsyms_on_each_symbol"
            fi
          fi

          sed -i 's/check_defconfig//' ./common/build.config.gki

      # ==================== Add SUSFS configuration ====================
      # Enable various hidden functions of SUSFS
      - name: Add SUSFS configuration
        if: inputs.enable_susfs
        run: |
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF

      # ==================== Configure kernel name ====================
      - name: configure kernel name
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          if [ -f "build/build.sh" ]; then
            sed -i 's/-dirty//' ./common/scripts/setlocalversion
          else
            # Configuring 6.1+ kernel
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' ./common/BUILD.bazel
            sed -i '/kmi_symbol_list_strict_mode/d' ./common/BUILD.bazel
            rm -rf ./common/android/abi_gki_protected_exports_*
            sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" ./build/kernel/kleaf/impl/stamp.bzl
          fi

          # Configure kernel name
          if [ -n "${{ inputs.version }}" ]; then
            CLEAN_VERSION=$(echo "${{ inputs.version }}" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+//')
            
            # Define KMI_TAG (consistent with automatic version)
            case "${{ inputs.android_version }}-${{ inputs.kernel_version }}" in
              "android14-6.1")  KMI_TAG="android14-11" ;;
              "android15-6.6")  KMI_TAG="android15-8" ;;
              "android16-6.12") KMI_TAG="android16-5" ;;
              *) KMI_TAG="${{ inputs.android_version }}" ;;
            esac
            
            if [ "${{ inputs.kernel_version }}" = "6.1" ]; then
              # 6.1: Old format, contains KMI_TAG
              KMI_LOCAL="-${KMI_TAG}${CLEAN_VERSION}"
              sed -i "\$s|echo \"\$res\"|echo \"${KMI_LOCAL}\"|" ./common/scripts/setlocalversion 2>/dev/null || true
              sed -i "/^CONFIG_LOCALVERSION=/ s/=\"[^\"]*\"/=\"${KMI_LOCAL}\"/" ./common/arch/arm64/configs/gki_defconfig 2>/dev/null || true
            elif [ "${{ inputs.kernel_version }}" = "5.10" ] || [ "${{ inputs.kernel_version }}" = "5.15" ]; then
              # 5.x: Old format, does not contain KMI_TAG
              sed -i "\$s|echo \"\$res\"|echo \"${CLEAN_VERSION}\"|" ./common/scripts/setlocalversion 2>/dev/null || true
              sed -i '/^CONFIG_LOCALVERSION=/ s/="\([^"]*\)"/="'"$CLEAN_VERSION"'"/' ./common/arch/arm64/configs/gki_defconfig
            else
              # 6.6+: New format setlocalversion, including KMI_TAG
              SUFFIX="-${KMI_TAG}${CLEAN_VERSION}"
              perl -i -0777 -pe 's/(.*)echo "\$\{KERNELVERSION\}\$\{file_localversion\}\$\{config_localversion\}\$\{LOCALVERSION\}\$\{scm_version\}"/$1echo "\$\{KERNELVERSION\}'"${SUFFIX}"'"/s' ./common/scripts/setlocalversion 2>/dev/null || true
            fi
          elif [ ! -f "build/build.sh" ]; then
            cd ./common
            BID="ab$((RANDOM % 90000000 + 10000000))"
            GHASH=$(git rev-parse --verify HEAD | cut -c1-13)
            # Unified kernel name format: -androidXX-KMI-gHASH-BID-4k
            case "${{ inputs.android_version }}-${{ inputs.kernel_version }}" in
              "android14-6.1")  KMI_TAG="android14-11" ;;
              "android15-6.6")  KMI_TAG="android15-8" ;;
              "android16-6.12") KMI_TAG="android16-5" ;;
              *) KMI_TAG="${{ inputs.android_version }}" ;;
            esac

            if [ "${{ inputs.kernel_version }}" = "6.1" ]; then
              # 6.1: Inject version name via setlocalversion (old format)
              KMI_LOCAL="-${KMI_TAG}-g${GHASH}-${BID}-4k"
              sed -i "\$s|echo \"\$res\"|echo \"${KMI_LOCAL}\"|" ./scripts/setlocalversion 2>/dev/null || true
              sed -i "/^CONFIG_LOCALVERSION=/ s/=\"[^\"]*\"/=\"${KMI_LOCAL}\"/" ./arch/arm64/configs/gki_defconfig 2>/dev/null || true
            else
              # 6.6+: Modify setlocalversion to inject version name (new format, refer to wild_kernel)
              # Keep ${KERNELVERSION} and ${config_localversion} parsed by script runtime
              SUFFIX="-${KMI_TAG}-g${GHASH}-${BID}"
              perl -i -0777 -pe 's/(.*)echo "\$\{KERNELVERSION\}\$\{file_localversion\}\$\{config_localversion\}\$\{LOCALVERSION\}\$\{scm_version\}"/$1echo "\$\{KERNELVERSION\}'"${SUFFIX}"'\$\{config_localversion\}"/s' ./scripts/setlocalversion 2>/dev/null || true
            fi
          fi

      # ==================== Custom build time ====================
      - name: Set custom build time
        shell: bash
        run: |
          # Read input: When N/n is entered or left blank, the current IST (Asia/Kolkata) time is used
          INPUT_TIME="${{ inputs.build_time }}"
          if [[ -n "$INPUT_TIME" && "$INPUT_TIME" != "N" && "$INPUT_TIME" != "n" ]]; then
            DATESTR="$INPUT_TIME"
          else
            DATESTR="$(TZ='Asia/Kolkata' date +'%a %b %d %T %Z %Y')"
          fi

          # Export to subsequent compilation process
          echo "Use build time: $DATESTR"
          echo "KBUILD_BUILD_TIMESTAMP=$DATESTR" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_VERSION=1" >> "$GITHUB_ENV"

          # Unified processing of mkcompile_h patches
          f="$KERNEL_ROOT/common/scripts/mkcompile_h"
          if [ -f "$f" ]; then
            if [[ "${{ inputs.kernel_version }}" == "5.10" || "${{ inputs.kernel_version }}" == "5.15" ]]; then
              echo "Apply 5.x classic timestamp patch: $f"
              perl -pi -e "s{UTS_VERSION=\"\\\$\(echo \\\$UTS_VERSION \\\$CONFIG_FLAGS \\\$TIMESTAMP \\| cut -b -\\\$UTS_LEN\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $DATESTR\"}" "$f"
            else
              echo "Apply 6.x mkcompile_h patch: $f"
              if grep -q 'UTS_VERSION=' "$f"; then
                perl -pi -e "s{UTS_VERSION=\"\\\$\\\(.*?\\\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $DATESTR\"}" "$f"
              else
                perl -0777 -pi -e "s{cat <<EOF}{cat <<EOF\n#undef UTS_VERSION\n#define UTS_VERSION \"#1 SMP PREEMPT $DATESTR\" } unless /UTS_VERSION/" "$f"
              fi
            fi
          fi

      # ==================== Compile the kernel ====================
      # Compile the kernel using a retry mechanism and automatically retry after timeout
      - name: Build - if the error occurs, the KSU has temporarily not synchronized the SUSFS code or has a compile-time error (waiting for the KSU warehouse to be repaired)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_on: timeout
          command: |
            echo "::group::Build instructions"
            echo "Generally, there will be no error unless the KSU warehouse and SUSFS warehouse codes are different."
            echo "Don't ask, don't be anxious, it has nothing to do with how hard you work or give me feedback, because it has nothing to do with me."
            echo "Just wait for adaptation. If you have the ability, go to the SUKISU warehouse and submit the code yourself."
            echo "::endgroup::"
            
            echo "Current KSU latest commit date: ${KSU_LATEST_COMMIT_DATE}"
            echo "Current SUSFS latest commit date: ${SUSFS_LATEST_COMMIT_DATE}"
            set -ex
            cd "$KERNEL_ROOT"

            sed -i 's/BUILD_SYSTEM_DLKM=1/BUILD_SYSTEM_DLKM=0/' ./common/build.config.gki.aarch64
            sed -i '/MODULES_ORDER=android\/gki_aarch64_modules/d' ./common/build.config.gki.aarch64
            sed -i '/KMI_SYMBOL_LIST_STRICT_MODE/d' ./common/build.config.gki.aarch64

            if [ -f "build/build.sh" ]; then
              # 5.x kernel uses legacy build scripts
              LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh CC="/usr/bin/ccache clang" || exit 1
              strings "out/${{ inputs.android_version }}-${{ inputs.kernel_version }}/dist/Image" | grep 'Linux version'
            else
              # 6.1+ kernel built with Bazel
              # Extract gki_defconfig and modify it to fragment to avoid bazel trim check failure
              FRAG="common/arch/arm64/configs/ksu.fragment"
              diff "$DEFCONFIG.orig" "$DEFCONFIG" | grep '^>' | sed 's/^> //; s/^[[:space:]]*//' > "$FRAG" || true
              cp "$DEFCONFIG.orig" "$DEFCONFIG"
              echo "=== KSU Fragment content ==="
              cat "$FRAG"
              echo "========================="
              # Pass parameters only if fragment is non-empty
              FRAG_FLAG=""
              if [ -s "$FRAG" ]; then
                FRAG_FLAG="--defconfig_fragment=//common:arch/arm64/configs/ksu.fragment"
              fi
              # 6.12+ uses lto=none (Rust kernel modules are not compatible with thin LTO)
              LTO_FLAG="--lto=thin"
              if [ "${{ inputs.kernel_version }}" = "6.12" ]; then
                LTO_FLAG="--lto=none"
              fi
              tools/bazel build --disk_cache=/home/runner/.cache/bazel --config=fast $LTO_FLAG $FRAG_FLAG //common:kernel_aarch64_dist || exit 1
              strings ./bazel-bin/common/kernel_aarch64/Image | grep 'Linux version'
            fi

            echo "Generally, there will be no error unless the KSU warehouse and SUSFS warehouse codes are different."
            echo "Don't ask, don't be anxious, it has nothing to do with how hard you work or give me feedback, because it has nothing to do with me."
            echo "Just wait for adaptation. If you have the ability, go to the SUKISU warehouse and submit the code yourself."
            echo "Current KSU latest commit date: ${KSU_LATEST_COMMIT_DATE}"
            echo "Current SUSFS latest commit date: ${SUSFS_LATEST_COMMIT_DATE}"
            echo "If the dates are different or too far apart, the patch will be invalid and the compilation will fail."

      # ==================== Preparing the kernel Image ====================
      # Copy the compiled product to the working directory for packaging and use by AnyKernel3
      - name: Prepare kernel Image
        run: |
          if [ "${{ inputs.android_version }}" == "android12" ] || [ "${{ inputs.android_version }}" == "android13" ]; then
            SRC_DIR="$KERNEL_ROOT/out/${{ inputs.android_version }}-${{ inputs.kernel_version }}/dist"
          else
            SRC_DIR="$KERNEL_ROOT/bazel-bin/common/kernel_aarch64"
          fi

          cp "$SRC_DIR/Image" ./

      # ==================== Create AnyKernel3 compressed package ====================
      - name: Create AnyKernel3 compressed package
        run: |
          cd $ANYKERNEL3
          ZIP_NAME="${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-AnyKernel3.zip"
          mv ../Image ./Image
          zip -r "../$ZIP_NAME" ./*

