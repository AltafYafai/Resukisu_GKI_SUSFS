      # ==================== Collect patch conflict files ====================
      # Collect all .rej files for debugging patch failure issues
      - name: Collect patch conflict files
        if: always()
        run: |
          REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
          mkdir -p "$REJECTS_DIR"

          mapfile -t REJS < <(find "$KERNEL_ROOT" -type f -name '*.rej')
          REJ_COUNT=${#REJS[@]}
          echo "$REJ_COUNT .rej files found"
          echo "REJ_COUNT=$REJ_COUNT" >> $GITHUB_ENV

          if [ "$REJ_COUNT" -gt 0 ]; then
            for REJ in "${REJS[@]}"; do
              REL="${REJ#"$KERNEL_ROOT"/}"
              DEST="$REJECTS_DIR/$REL"
              mkdir -p "$(dirname "$DEST")"
              cp "$REJ" "$DEST"

              ORIG="${REJ%.rej}"
              if [ -f "$ORIG" ]; then
                cp "$ORIG" "${DEST%.rej}"
              fi
              echo "$REL" >> "$REJECTS_DIR/index.txt"
            done
          fi

      # ==================== Upload the build product ====================
      # The AnyKernel3 package itself is already a zip, and upload-artifact will enclose another zip container.
      # compression-level=0 turns off outer compression to avoid secondary compression of compressed AK3
      - name: Upload build product
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.ksu_variant }}_kernel-${{ env.CONFIG }}
          path: |
            *AnyKernel3.zip
#            *.img
          compression-level: 0

      # ==================== Upload patch conflict file ====================
      - name: Upload patch conflict file
        if: always() && env.REJ_COUNT > 0
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.ksu_variant }}_kernel-${{ env.CONFIG }}-Rejects
          path: patch-rejects/
          if-no-files-found: ignore
          compression-level: 9
