# ========================================
# GKI Kernel Build Main Entry
# ========================================
# This workflow is the unified entry point for the project, used to:
# 1. Build selected versions of the GKI Kernel
# 2. Get the latest KSU Manager
# 3. Collect patch conflict files for debugging
# 4. Create a GitHub Release (optional)
# ========================================

name: Build Kernel

# Adapt to Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Concurrency control: only run one instance per branch, cancel older runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # ==================== Release Config ====================
      release_type:
        description: "Release Type"
        type: choice
        options:
          - Actions
          - Pre-Release
          - Release
        default: Actions

      # ==================== KernelSU Config ====================
      # KernelSU variant fixed to KernelSU-Next
      kernelsu_branch:
        description: "KernelSU-Next branch (next/dev/custom, leave empty for default branch next/next-susfs)"
        type: string
        default: ""
        required: false

      # ==================== Optional Config ====================
      version:
        description: "Custom Version Name (Optional)"
        type: string
        default: ""
        required: false
      build_time:
        description: "Custom Build Time (Optional, leave empty for current time)"
        type: string
        default: ""
        required: false
      droidspaces:
        description: "Droidspaces Container Support (5.10~6.6: Slot patch, 6.12: On/Off)"
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      droidspaces_ntsync:
        description: "Enable Droidspaces Container NTSync Support (requires Droidspaces)"
        type: boolean
        default: false

      # ==================== Feature Switches ====================
      use_zram:
        description: "Enable ZRAM Enhancement Algorithm"
        type: boolean
        default: false
      use_bbg:
        description: "Enable BBG Brick Protection"
        type: boolean
        default: false
      use_rekernel:
        description: "Enable Re-Kernel Driver"
        type: boolean
        default: false
      cve_2026_43499_patch:
        description: "Apply CVE-2026-43499 rtmutex patch chain"
        type: boolean
        default: true
      cancel_susfs:
        description: "Disable SUSFS"
        type: boolean
        default: false

      # ==================== Build Version Selection ====================
      build_a12_5_10:
        description: "Android 12 - 5.10"
        type: boolean
        default: false
      build_a13_5_15:
        description: "Android 13 - 5.15"
        type: boolean
        default: false
      build_a14_6_1:
        description: "Android 14 - 6.1"
        type: boolean
        default: false
      build_a15_6_6:
        description: "Android 15 - 6.6"
        type: boolean
        default: false
      build_a16_6_12:
        description: "Android 16 - 6.12"
        type: boolean
        default: false
      build_all:
        description: "Build All Versions"
        type: boolean
        default: true

      # ==================== Bot-Push Options ====================
      commit:
        description: "Commit (sha or description)"
        type: string
        default: ""
        required: false
      change_log:
        description: "Change Log (Optional, supports multiline)"
        type: string
        default: ""
        required: false

jobs:
  # ==================== Get Manager ====================
  # Download the latest KernelSU Manager APK and SUSFS module
  get-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit

  # ==================== Android 12 - 5.10 Build ====================
  build-a12-5-10:
    uses: ./.github/workflows/kernel-a12-5-10.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cve_2026_43499_patch: ${{ inputs.cve_2026_43499_patch }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces }}
      droidspaces_ntsync: ${{ inputs.droidspaces_ntsync }}
      called_from_main: true

  # ==================== Collect patch conflict files ====================
  # Summarize .rej files in all build tasks to facilitate debugging patch issues
  collect-rejects:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - build-a12-5-10
    steps:
      - name: Download conflicting files
        # Just keep the build check of Android 12 5.10, other build-* checks are omitted here
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
          pattern: '*-Rejects'

      - name: handle conflict files
        run: |
          mkdir -p aio-rejects
          for dir in ./downloaded-artifacts/*-Rejects; do
            [ -d "$dir" ] || continue
            dirname=$(basename "$dir")
            original_name=${dirname%-Rejects}
            mkdir -p "aio-rejects/$original_name"
            cp -r "$dir/." "aio-rejects/$original_name/"
          done
          if [ "$(ls -A aio-rejects 2>/dev/null)" ]; then
            cd aio-rejects && zip -r -q -9 ../AIO-REJ.zip . && cd ..
          fi

      - name: Upload summary conflict file
        uses: actions/upload-artifact@v6
        with:
          name: AIO-REJ
          path: AIO-REJ.zip
          if-no-files-found: ignore

  # ==================== Create Release ====================
  # Create a GitHub Release when release_type is not Actions
  # Only the original repository can be run. Fork repositories skip this step.
  release:
    if: ${{ always() && !cancelled() && inputs.release_type != 'Actions' && (github.repository_owner == 'altafyafai' || github.repository == 'ReSukiSU-GKI/GKI_KernelSU_SUSFS') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    needs:
      - get-manager
      - build-a12-5-10

    # ==================== Environment variables ====================
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ==================== Set display name ====================
      # Precompute various display names to simplify subsequent references
      - name: Set display name
        run: |
          KSU_NAME="KernelSU-Next"
          echo "KSU_NAME=$KSU_NAME" >> $GITHUB_ENV

          KSU_VER="${{ needs.get-manager.outputs.ksuVer }}"
          SUS_VER="${{ needs.get-manager.outputs.susVer }}"
          echo "KSU_VER=$KSU_VER" >> $GITHUB_ENV
          echo "SUS_VER=$SUS_VER" >> $GITHUB_ENV

          echo "LZ4_STATUS=${{ inputs.use_zram && '开启' || '未开启' }}" >> $GITHUB_ENV
          echo "BBG_STATUS=${{ inputs.use_bbg && '支持' || '不支持' }}" >> $GITHUB_ENV
          echo "LZ4_SUFFIX=${{ inputs.use_zram && '、LZ4KD' || '' }}" >> $GITHUB_ENV

          echo "HOOK_TYPE=-> SUSFS Inline Hooks" >> $GITHUB_ENV
          echo "MOUNT_TYPE=-> Magic Mount support" >> $GITHUB_ENV
          echo "KSU_SUFFIX=" >> $GITHUB_ENV

          if [ -n "${{ inputs.kernelsu_branch }}" ]; then
            echo "BRANCH_INFO=(${{ inputs.kernelsu_branch }})" >> $GITHUB_ENV
          else
            echo "BRANCH_INFO=Stable version" >> $GITHUB_ENV
          fi

          echo "RELEASE_NAME=GKI Kernel: ${KSU_NAME}(${KSU_VER}) & SUSFS ${SUS_VER}" >> $GITHUB_ENV

      - name: Verify build status
        run: |
          failed=0
          check_build() {
            local selected="$1" job_name="$2" result="$3"
            if [[ "$selected" == "true" && "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Selected build task $job_name failed (result: $result)"
              failed=1
            fi
          }
          check_build "true" "build-a12-5-10" "${{ needs.build-a12-5-10.result }}"
          [[ "$failed" -ne 0 ]] && exit 1 || true

      - name: checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Determine the KSU branch
        if: inputs.kernelsu_branch != ''
        run: |
          BRANCH="${{ inputs.kernelsu_branch }}"
          echo "KSU_BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Get KernelSU submission information
        run: |
          REPO_URL="https://github.com/KernelSU-Next/KernelSU-Next.git"
          REPO_URL2="KernelSU-Next/KernelSU-Next"

          # If the user enters a custom branch/commit, it will be used first.
          if [ -n "${{ inputs.kernelsu_branch }}" ]; then
            BRANCH_INPUT="${{ inputs.kernelsu_branch }}"
            # Check if it is a commit hash (40 digit hexadecimal)
            if [[ "$BRANCH_INPUT" =~ ^[a-fA-F0-9]{40}$ ]]; then
              KSU_REF=$BRANCH_INPUT
              KSU_URL="https://github.com/$REPO_URL2/commit/$BRANCH_INPUT"
            else
              # Is the branch name, get the latest commit of the branch
              COMMIT_HASH=$(git ls-remote $REPO_URL refs/heads/$BRANCH_INPUT | awk '{ print $1 }')
              KSU_REF=$COMMIT_HASH
              KSU_URL="https://github.com/$REPO_URL2/commit/$COMMIT_HASH"
            fi
          else
            # Default: Get the latest commit of next or next-susfs
            # Prefer next-susfs (if susfs is enabled)
            if [ "${{ inputs.cancel_susfs }}" == "true" ]; then
              BRANCH="next"
            else
              BRANCH="next-susfs"
              REPO_URL="https://github.com/pershoot/KernelSU-Next.git"
              REPO_URL2="pershoot/KernelSU-Next"
            fi
            COMMIT_HASH=$(git ls-remote $REPO_URL refs/heads/$BRANCH | awk '{ print $1 }')
            KSU_REF=$COMMIT_HASH
            KSU_URL="https://github.com/$REPO_URL2/commit/$COMMIT_HASH"
          fi

          echo "KSU_REF=$KSU_REF" >> $GITHUB_ENV
          echo "KSU_URL=$KSU_URL" >> $GITHUB_ENV

      - name: Get SUSFS commit information
        run: |
          GITLAB_OWNER="simonpunk"
          GITLAB_REPO="susfs4ksu"
          declare -A BRANCH_MAP=(
            ["gki_android12_5_10"]="gki-android12-5.10"
          )
          for var_name in "${!BRANCH_MAP[@]}"; do
            branch_name="${BRANCH_MAP[$var_name]}"
            COMMIT_HASH=$(git ls-remote https://gitlab.com/$GITLAB_OWNER/$GITLAB_REPO.git refs/heads/$branch_name | awk '{ print $1 }')
            if [[ -n "$COMMIT_HASH" ]]; then
              COMMIT_URL="https://gitlab.com/$GITLAB_OWNER/$GITLAB_REPO/-/commit/$COMMIT_HASH"
              echo "COMMIT_HASH_${var_name}=$COMMIT_HASH" >> "$GITHUB_ENV"
              echo "COMMIT_URL_${var_name}=$COMMIT_URL" >> "$GITHUB_ENV"
            fi
          done

      - name: Generate release notes
        run: |
          cat > release_body.md << EOF
          # # 📦 Release Contents

          **${{ env.KSU_NAME }}** + **SUSFS ${{ env.SUS_VER }}**${{ env.LZ4_SUFFIX }}

          # ## ✨ Features / Features

          | Component / Component | Status / Status |
          |:---|:---|
          | ${{ env.KSU_NAME }} | ${{ env.KSU_SUFFIX }}${{ env.BRANCH_INFO }} |
          | SUSFS | ඞ ${{ env.SUS_VER }} |
          | BBG Security Patch | ${{ env.BBG_STATUS }} |
          | LZ4KD & ONEPLUS_LZ4K | ${{ env.LZ4_STATUS }} |
          | LZ4 | v1.10.0 ${{ env.LZ4_STATUS }} |

          ${{ env.HOOK_TYPE }}
          ${{ env.MOUNT_TYPE }}

          > 💡[Unicode zero-width bypass fix](https://t.me/real5ec1cff/268) - Please use Xposed module

          # ## 📥 Recommended Module / Recommended Module

          - https://github.com/sidex15/ksu_module_susfs

          ---

          > [!IMPORTANT]
          > ### ⚠️ Risk Disclaimer
          >
          > This project integrates multiple **actively maintained upstream components**. Due to the frequent updates and interdependence of each component, **the following problems may occur**:
          >
          > - 🔄 Infinite reboot (Bootloop)
          > - 🐛 Functional abnormality or system instability
          >
          > **Before flashing, please be sure to: **
          > 1. Back up the original Boot image to ensure it can be restored at any time
          > 2. Record the current time to facilitate log analysis
          >
          > ---
          >
          > This project integrates multiple **actively maintained upstream components**. Due to frequent updates and dependencies, **the following issues may occur**:
          >
          > - 🔄 Bootloop
          > - 🐛 Functional issues or system instability
          >
          > **Before flashing, please ensure:**
          > 1. Backup your stock boot image for recovery
          > 2. Note the current time for log analysis

          <details>
          <summary>📋 Post-Flash Guide</summary>

          # ### ✅ If Boot Successful

          Congratulations! Enjoy your new core 🎉

          Congratulations! Enjoy your new kernel 🎉

          # ### ❌ If Boot Failed

          1. Restore the original Boot image
          2. Extract kernel logs using KernelSU manager
          3. Submit the log to [Issues](https://github.com/zzh20188/GKI_KernelSU_SUSFS/issues) or consult professionals

          1. Restore stock boot image
          2. Extract kernel logs using KernelSU Manager
          3. Submit logs to [Issues](https://github.com/zzh20188/GKI_KernelSU_SUSFS/issues) or consult experts

          </details>

          ---

          <details>
          <summary>🔗 Submit information / Commit Info</summary>

          **KernelSU-Next**: [${{ env.KSU_REF }}](${{ env.KSU_URL }})

          **SUSFS4KSU**:
          - gki-android12-5.10: [${{ env.COMMIT_HASH_gki_android12_5_10 }}](${{ env.COMMIT_URL_gki_android12_5_10 }})

          </details>

          ---

          **LTO**: thin

          📂 Click **Assets** below to expand download / Click **Assets** below to download
          EOF

      - name: Generate version label
        run: |
          SUS_VERSION="${{ needs.get-manager.outputs.susVer }}"
          if [ -z "$SUS_VERSION" ]; then
            echo "Warning: SUSFS version not obtained, use default version number"
            SUS_VERSION="1.0.0"
          fi

          LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name' 2>/dev/null | sed 's/-.*//' || echo "")

          if [ "$SUS_VERSION" = "$LATEST_TAG" ]; then
            LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name')
          else
            LATEST_TAG="$SUS_VERSION-r0"
          fi

          NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

          echo "Generate tag: $NEW_TAG"

      - name: Download build product
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts

      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" == "Pre-Release" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$NEW_TAG" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_body.md \
            --target "$GITHUB_SHA" \
            $PRERELEASE_FLAG

      - name: upload manager and SUSFS module
        continue-on-error: true
        run: |
          echo "Preparing to upload APK and SUSFS module..."
          apk_count=$(find ./downloaded-artifacts -type f -name "*.apk" | wc -l || true)
          sus_count=$(find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" | wc -l || true)
          echo "APK files: ${apk_count}"
          echo "SUSFS files: ${sus_count}"
          find ./downloaded-artifacts -type f -name "*.apk" -print0 | \
          while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done
          find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" -print0 | \
          while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done

      - name: Upload kernel product
        run: |
          for file in ./downloaded-artifacts/*_kernel-*/*; do
            [ -d "$file" ] && continue
            [[ "$file" == *-Rejects/* ]] && continue
            echo "Upload $file..."
            gh release upload "$NEW_TAG" "$file"
          done

      - name: Convert release from draft to publish status
        run: |
          gh release edit --draft=false "$NEW_TAG"

      - name: build summary
        run: |
          echo "## Release created" >> $GITHUB_STEP_SUMMARY
          echo "- **TAG**: $NEW_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Link**: https://github.com/$REPO_OWNER/$REPO_NAME/releases/tag/$NEW_TAG" >> $GITHUB_STEP_SUMMARY

      - name: Send Telegram channel notification
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          set -euo pipefail

          INPUT_COMMIT="${{ inputs.commit }}"
          INPUT_CHANGE_LOG="${{ inputs.change_log }}"

          TEXT=$(cat <<EOF
          <b>New GKI Release:</b>
          
          Branch: <code>${{ github.ref_name }}</code>
          Commit: ${INPUT_COMMIT}
          Tag: <code>${NEW_TAG}</code>
          
          Features: 
          <pre>ReSukiSU = true
          SuSFS = ${{ inputs.cancel_susfs && 'false' || 'true' }}
          BBG = ${{ inputs.use_bbg && 'true' || 'false' }}
          LZ4KD = ${{ inputs.use_zram && 'true' || 'false' }}
          Re-Kernel = ${{ inputs.use_rekernel && 'true' || 'false' }}
          Droidspaces = ${{ inputs.droidspaces }}${{ inputs.droidspaces_ntsync && ' + NTSync' || '' }}
          KPatch-Next Support = true</pre>
          Change Log: 
          <pre>${INPUT_CHANGE_LOG}
          </pre>
          
          Download: <a href="https://github.com/${{ github.repository }}/releases/tag/${NEW_TAG}">Click Here</a>

          Note: The "commit" here refers to ReSukiSU's commit, not this repository's.
          EOF
          )

          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode text="${TEXT}"

      - name: Upload products and managers to Telegram channel
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          set -euo pipefail

          echo "Start uploading APK and core products to Telegram..."

          # Upload Manager APKs
          find ./downloaded-artifacts -type f -name "*.apk" -print0 | \
          while IFS= read -r -d '' f; do
            filename=$(basename "$f")
            echo "Uploading Manager to Telegram: $filename"
            curl -s -F chat_id="${CHAT_ID}" \
              -F document=@"$f" \
              -F caption="KernelSU-Next Manager APK (version: ${{ env.KSU_VER }})" \
              "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" || true
          done

          # Upload Kernel build files (excluding rejects)
          for file in ./downloaded-artifacts/*_kernel-*/*; do
            [ -d "$file" ] && continue
            [[ "$file" == *-Rejects/* ]] && continue
            filename=$(basename "$file")
            echo "Uploading Kernel to Telegram: $filename"
            curl -s -F chat_id="${CHAT_ID}" \
              -F document=@"$file" \
              -F caption="GKI Kernel Build: $filename (tag: $NEW_TAG)" \
              "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" || true
          done

      - name: Send Telegram group notification (ReSukiSU group)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID_2 }}
          message_thread_id: ${{secrets.MESSAGE_THREAD_ID}}
        run: |
          set -euo pipefail

          INPUT_COMMIT="${{ inputs.commit }}"
          INPUT_CHANGE_LOG="${{ inputs.change_log }}"

          TEXT=$(cat <<EOF
          <b>New GKI Release:</b>
          
          Branch: <code>${{ github.ref_name }}</code>
          Commit: ${INPUT_COMMIT}
          Tag: <code>${NEW_TAG}</code>
          
          Features: 
          <pre>ReSukiSU = ${{ inputs.kernelsu_variant == 'ReSukiSU' && 'true' || 'false' }}
          SuSFS = ${{ inputs.cancel_susfs && 'false' || 'true' }}
          BBG = ${{ inputs.use_bbg && 'true' || 'false' }}
          LZ4KD = ${{ inputs.use_zram && 'true' || 'false' }}
          Re-Kernel = ${{ inputs.use_rekernel && 'true' || 'false' }}
          Droidspaces = ${{ inputs.droidspaces }}${{ inputs.droidspaces_ntsync && ' + NTSync' || '' }}
          KPatch-Next Support = true</pre>
          Change Log: 
          <pre>${INPUT_CHANGE_LOG}
          </pre>
          
          Download: <a href="https://t.me/ReSukiSUKernelBuilds">View In Channel</a>

          Note: The "commit" here refers to ReSukiSU's commit, not this repository's.
          EOF
          )

          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d message_thread_id="${message_thread_id}" \
            -d parse_mode="HTML" \
            --data-urlencode text="${TEXT}"

      - name: Send Telegram group notification (channel discussion group)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID_3 }}
          message_thread_id: ${{secrets.MESSAGE_THREAD_ID_2}}
        run: |
          set -euo pipefail

          INPUT_COMMIT="${{ inputs.commit }}"
          INPUT_CHANGE_LOG="${{ inputs.change_log }}"

          TEXT=$(cat <<EOF
          <b>New GKI Release:</b>
          
          Branch: <code>${{ github.ref_name }}</code>
          Commit: ${INPUT_COMMIT}
          Tag: <code>${NEW_TAG}</code>
          
          Features: 
          <pre>ReSukiSU = ${{ inputs.kernelsu_variant == 'ReSukiSU' && 'true' || 'false' }}
          SuSFS = ${{ inputs.cancel_susfs && 'false' || 'true' }}
          BBG = ${{ inputs.use_bbg && 'true' || 'false' }}
          LZ4KD = ${{ inputs.use_zram && 'true' || 'false' }}
          Re-Kernel = ${{ inputs.use_rekernel && 'true' || 'false' }}
          Droidspaces = ${{ inputs.droidspaces }}${{ inputs.droidspaces_ntsync && ' + NTSync' || '' }}
          KPatch-Next Support = true</pre>
          Change Log: 
          <pre>${INPUT_CHANGE_LOG}
          </pre>
          
          Download: <a href="https://t.me/ReSukiSUKernelBuilds">View In Channel</a>

          Note: The "commit" here refers to ReSukiSU's commit, not this repository's.
          EOF
          )

          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d message_thread_id="${message_thread_id}" \
            -d parse_mode="HTML" \
            --data-urlencode text="${TEXT}"
